name: Published release smoke

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Immutable Algomim release tag to verify
        required: true
        type: string

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - name: Verify published Windows lifecycle
        shell: powershell
        run: >-
          powershell -NoProfile -ExecutionPolicy Bypass
          -File tests/codex-published-lifecycle.ps1
          -Tag "${{ github.event.release.tag_name || inputs.tag }}"

  posix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - name: Verify published POSIX lifecycle
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: sh tests/codex-published-lifecycle.sh --tag "$RELEASE_TAG"
